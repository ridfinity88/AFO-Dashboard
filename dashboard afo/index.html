<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symmetry Machine Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        :root {
            --width-col-left: 1.0fr;
            --width-col-center: 1.2fr;
            --width-col-right: 0.6fr;

            --height-cen-view: 0.6fr;
            --height-machine-1: 0.8fr;
            --height-machine-2: 0.8fr;

            --height-chart-top: 1fr;
            --height-chart-bottom: 1fr;
        }

        html, body {
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000000;
            color: #f8fafc;
            font-family: sans-serif;
        }

        /* LOGIN PAGE */
        #loginPage {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        .login-box {
            width: 320px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .login-box h2 {
            text-align: center;
            color: #60a5fa;
            margin: 0;
        }

        .login-box input {
            height: 42px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #020617;
            color: white;
            padding: 0 12px;
            font-size: 16px;
            outline: none;
        }

        .login-box button {
            height: 42px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .login-box button:hover {
            background: #1d4ed8;
        }

        .error-text {
            color: #f87171;
            font-size: 13px;
            text-align: center;
            display: none;
        }

        /* DASHBOARD */

        #dashboardPage {
            display: none;
            width: 100%;
            height: 100%;
        }

        .dashboard-container {
            display: grid;
            grid-template-columns: var(--width-col-left) var(--width-col-center) var(--width-col-right);
            gap: 1rem;
            height: calc(100vh - 4.5rem);
            padding: 0 1rem 1rem 1rem;
        }

        .center-panel {
            display: grid;
            grid-template-rows: var(--height-cen-view) var(--height-machine-1) var(--height-machine-2);
            gap: 1rem;
        }

        .right-panel {
            display: grid;
            grid-template-rows: var(--height-chart-top) var(--height-chart-bottom);
            gap: 1rem;
        }

        .card {
            background-color: #000000;
            border: 1px solid #334155;
            border-radius: 0.75rem;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 0;
            width: 100%;
            height: 100%;
        }

        .machine-img {
            width: 90%;
            height: 85%;
            object-fit: contain;
        }

        .label-tag {
            position: absolute;
            top: 0.75rem;
            left: 0.75rem;
            font-size: 0.7rem;
            color: #94a3b8;
            font-weight: bold;
            z-index: 10;
            background: rgba(15, 23, 42, 0.8);
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .chart-container {
            position: relative;
            width: 100px;
            height: 100px;
        }

        .chart-value {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: 800;
            font-size: 0.9rem;
            color: #10b981;
        }

    </style>
</head>

<body>

    <!-- LOGIN -->
    <div id="loginPage">

        <div class="login-box">

            <h2>LOGIN</h2>

            <input
                type="password"
                id="passwordInput"
                placeholder="Enter Password"
            >

            <button id="loginBtn">
                Login
            </button>

            <div class="error-text" id="errorText">
                Incorrect Password
            </div>

        </div>

    </div>

    <!-- DASHBOARD -->
    <div id="dashboardPage" class="flex flex-col">

        <header class="flex justify-between items-center h-14 px-6 flex-shrink-0">
            <h1 class="text-xl font-bold text-blue-400 uppercase tracking-tight">
                Machine Monitoring System
            </h1>

            <div id="clock" class="text-lg font-mono text-slate-400">
                00:00:00
            </div>
        </header>

        <main class="dashboard-container">

            <!-- DATA -->
            <div class="card !justify-start p-4 overflow-hidden">

                <span class="label-tag">⑤ DATA</span>

                <div class="w-full mt-8">

                    <table class="w-full text-[11px] text-left">

                        <thead class="text-blue-300 border-b border-slate-700">
                            <tr>
                                <th>Name</th>
                                <th class="text-center">T</th>
                                <th class="text-center">P</th>
                                <th class="text-right">S</th>
                            </tr>
                        </thead>

                        <tbody id="data-table"></tbody>

                    </table>

                </div>

            </div>

            <!-- CENTER PANEL -->
            <div class="center-panel">

                <div class="card">
                    <span class="label-tag">Center View</span>
                    <img src="cen.png" class="machine-img">
                </div>

                <div class="card">
                    <span class="label-tag">① MACHINE INLET</span>
                    <img src="in.png" class="machine-img">
                </div>

                <div class="card">
                    <span class="label-tag">② MACHINE OUTLET</span>
                    <img src="out.png" class="machine-img">
                </div>

            </div>

            <!-- RIGHT PANEL -->
            <div class="right-panel">

                <div class="card p-4 !justify-around">

                    <span class="label-tag">③ STATUS RATIO</span>

                    <div class="flex items-center w-full px-2 mt-4">

                        <div class="chart-container flex-shrink-0">
                            <canvas id="pieChart1"></canvas>
                            <div id="val-p1" class="chart-value text-green-400">
                                85%
                            </div>
                        </div>

                    </div>

                    <div class="flex items-center w-full px-2">

                        <div class="chart-container flex-shrink-0">
                            <canvas id="pieChart2"></canvas>
                            <div id="val-p2" class="chart-value text-blue-400">
                                60%
                            </div>
                        </div>

                    </div>

                </div>

                <div class="card p-2">

                    <span class="label-tag">④ PRODUCTION</span>

                    <div class="w-full h-full pt-8">
                        <canvas id="lineChart"></canvas>
                    </div>

                </div>

            </div>

        </main>

    </div>

    <script>

        // =========================
        // LOGIN SYSTEM
        // =========================

        const PASSWORD = "1234";

        const passwordInput = document.getElementById('passwordInput');
        const loginBtn = document.getElementById('loginBtn');
        const loginPage = document.getElementById('loginPage');
        const dashboardPage = document.getElementById('dashboardPage');
        const errorText = document.getElementById('errorText');

        function login() {

            if (passwordInput.value === PASSWORD) {

                loginPage.style.display = "none";
                dashboardPage.style.display = "flex";

            } else {

                errorText.style.display = "block";
                passwordInput.value = "";
                passwordInput.focus();

            }

        }

        // กดปุ่ม Login
        loginBtn.addEventListener('click', login);

        // ===== จุดที่เพิ่ม =====
        // กด Enter เพื่อ Login ได้
        passwordInput.addEventListener('keydown', function(event) {

            if (event.key === 'Enter') {
                login();
            }

        });

        // =========================
        // DASHBOARD
        // =========================

        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxYeA5b5d9MMrpWhi1K19O5fqn5jliHDMUg0aCHdIfzlGtCTEQB33BrqgCzImSamZX8Bg/exec";

        setInterval(() => {
            document.getElementById('clock').innerText =
                new Date().toLocaleTimeString();
        }, 1000);

        // PIE CHART 1
        const pieChart1 = new Chart(document.getElementById('pieChart1'), {

            type: 'doughnut',

            data: {
                datasets: [{
                    data: [85, 10, 5],
                    backgroundColor: ['#10b981', '#334155', '#1e293b'],
                    borderWidth: 0
                }]
            },

            options: {
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                cutout: '80%'
            }

        });

        // PIE CHART 2
        const pieChart2 = new Chart(document.getElementById('pieChart2'), {

            type: 'doughnut',

            data: {
                datasets: [{
                    data: [60, 30, 10],
                    backgroundColor: ['#3b82f6', '#334155', '#1e293b'],
                    borderWidth: 0
                }]
            },

            options: {
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                cutout: '80%'
            }

        });

        // LINE CHART
        const lineChart = new Chart(document.getElementById('lineChart'), {

            type: 'line',

            data: {

                labels: ['1','2','3','4','5'],

                datasets: [

                    {
                        label: 'S1',
                        data: [10,25,15,30,20],
                        borderColor: '#3b82f6',
                        tension: 0.4,
                        pointRadius: 0,
                        borderWidth: 2
                    },

                    {
                        label: 'S2',
                        data: [15,10,25,20,30],
                        borderColor: '#10b981',
                        tension: 0.4,
                        pointRadius: 0,
                        borderWidth: 2
                    }

                ]

            },

            options: {

                maintainAspectRatio: false,

                plugins: {
                    legend: { display: false }
                },

                scales: {
                    x: { display: false },
                    y: { display: false }
                }

            }

        });

        async function fetchData() {

            try {

                const response = await fetch(SCRIPT_URL);
                const data = await response.json();

                let html = "";

                data.table.forEach(item => {

                    const statusColor =
                        item.status === 'Running'
                        ? 'text-green-400'
                        : 'text-amber-400';

                    html += `
                    <tr class="border-b border-slate-800/50">

                        <td class="py-2 font-bold text-slate-400">
                            ${item.machine}
                        </td>

                        <td class="py-2 text-lg text-center text-blue-400 font-bold">
                            ${item.temp}
                        </td>

                        <td class="py-2 text-lg text-center text-emerald-400 font-bold">
                            ${item.pressure}
                        </td>

                        <td class="py-2 text-right font-bold ${statusColor}">
                            ${item.status.charAt(0)}
                        </td>

                    </tr>`;
                });

                document.getElementById('data-table').innerHTML = html;

                const effValue = data.machine1.temp;

                document.getElementById('val-p1').innerText =
                    effValue + "%";

                pieChart1.data.datasets[0].data = [
                    effValue,
                    (100-effValue)*0.7,
                    (100-effValue)*0.3
                ];

                pieChart1.update();

            } catch (e) {

                console.error(e);

            }

        }

        fetchData();

        setInterval(fetchData, 10000);

    </script>

</body>
</html>
